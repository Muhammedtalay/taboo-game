<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#1e0f5c"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="manifest.json"/>
<title>Taboo</title>
<style>
:root {
  --bg: #102675;
  --bg2: #153196;
  --card-head: #e8304a;
  --blue: #178fd4;
  --purple: #dc78f3;
  --red: #e8304a;
  --green: #27c465;
  --amber: #f5a623;
  --radius: 20px;
  --radius-btn: 18px;
  --muted: rgba(255,255,255,0.7);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); }
body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; color: #fff; }

#app {
  position: fixed; inset: 0;
  max-width: 480px; margin: 0 auto;
  display: flex; flex-direction: column; overflow: hidden;
}
#app::before {
  content: ""; position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 36px 36px; pointer-events: none; z-index: 0;
}

/* ===== SCREEN TRANSITIONS ===== */
.screen {
  display: none; position: absolute; inset: 0;
  flex-direction: column;
  padding: 16px 16px max(16px, env(safe-area-inset-bottom, 16px));
  overflow: hidden; z-index: 1;
}
.screen.active { display: flex; animation: screenIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
.screen.exit    { animation: screenOut 0.25s ease-in both; }

@keyframes screenIn {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes screenOut {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to   { opacity: 0; transform: translateY(-16px) scale(0.97); }
}

/* ===== SETUP ===== */
#screen-setup {
  justify-content: center;
  padding-top: max(24px, env(safe-area-inset-top, 24px));
}

.logo-wrap { text-align: center; margin-bottom: clamp(14px,3.5vh,24px); }
.logo-icon {
  width: clamp(50px,12vw,66px); height: clamp(50px,12vw,66px);
  background: var(--purple); border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(20px,6vw,28px); font-weight: 900;
  margin: 0 auto 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: logoPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
.logo-title {
  font-size: clamp(22px,6vw,30px); font-weight: 900; letter-spacing: 1px;
  animation: logoPop 0.6s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
}
.logo-sub {
  font-size: clamp(11px,2.8vw,13px); color: var(--muted); margin-top: 3px;
  animation: logoPop 0.6s 0.18s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes logoPop {
  from { opacity: 0; transform: scale(0.7) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.setup-block { width: 100%; margin-bottom: clamp(10px,2.5vh,18px); }
.setup-lbl {
  font-size: clamp(10px,2.5vw,12px); color: var(--muted);
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; padding-left: 2px;
}

.lang-select-btn {
  width: 100%; padding: clamp(12px,3vh,16px) 16px;
  border: 2px solid rgba(255,255,255,0.2); border-radius: var(--radius-btn);
  background: rgba(255,255,255,0.08); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  font-size: clamp(14px,3.8vw,17px); font-weight: 700;
  -webkit-appearance: none; transition: all 0.2s;
}
.lang-select-btn:active { transform: scale(0.98); }
.lang-select-btn.selected { border-color: var(--amber); background: rgba(245,166,35,0.15); }
.lang-left { display: flex; align-items: center; gap: 10px; }
.lang-flag { font-size: clamp(18px,5vw,22px); line-height: 1; }
.lang-arrow { font-size: 14px; color: var(--muted); transition: transform 0.2s; }

.level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.level-btn {
  padding: clamp(10px,2.5vh,14px) 8px;
  border: 2px solid rgba(255,255,255,0.15); border-radius: var(--radius-btn);
  background: rgba(255,255,255,0.08);
  cursor: pointer; text-align: center; color: #fff;
  -webkit-appearance: none; transition: all 0.2s;
}
.level-btn:active { transform: scale(0.95); }
.level-btn.selected {
  border-color: var(--blue); background: rgba(23,143,212,0.25);
  animation: selectPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes selectPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.07); }
  100% { transform: scale(1); }
}
.level-badge { font-size: clamp(15px,4vw,19px); font-weight: 900; display: block; }
.level-desc  { font-size: clamp(10px,2.5vw,12px); color: var(--muted); margin-top: 2px; display: block; }

.time-row { display: flex; align-items: center; gap: 10px; }
.time-lbl { font-size: clamp(11px,2.8vw,13px); color: var(--muted); white-space: nowrap; }
.time-val { font-size: clamp(13px,3vw,15px); font-weight: 700; min-width: 38px; text-align: right; }
input[type=range] { flex: 1; accent-color: var(--blue); height: 6px; cursor: pointer; }

.start-btn {
  width: 100%; padding: clamp(13px,3.2vh,17px);
  background: linear-gradient(135deg,#27c465,#1aab54);
  color: #fff; border: none; border-radius: var(--radius-btn);
  font-size: clamp(15px,4vw,18px); font-weight: 900; cursor: pointer;
  letter-spacing: 0.5px; box-shadow: 0 6px 20px rgba(39,196,101,0.4);
  -webkit-appearance: none; transition: all 0.2s; margin-top: 4px;
}
.start-btn:not(:disabled):active { transform: scale(0.96); box-shadow: 0 3px 10px rgba(39,196,101,0.3); }
.start-btn:disabled { opacity: 0.4; cursor: default; box-shadow: none; }

/* ===== LANG MODAL ===== */
.lang-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  align-items: flex-end; justify-content: center; z-index: 300;
}
.lang-overlay.show { display: flex; animation: fadeIn 0.2s ease both; }
.lang-overlay.show .lang-sheet { animation: sheetUp 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.lang-sheet {
  background: var(--bg2); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 480px;
  padding: 20px 16px max(20px, env(safe-area-inset-bottom, 20px));
  border-top: 1px solid rgba(255,255,255,0.1);
}
.lang-sheet-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
}
.lang-sheet-title { font-size: clamp(16px,4.5vw,19px); font-weight: 900; }
.lang-close-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: none; background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.8); font-size: 14px; font-weight: 900;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-appearance: none; transition: all 0.15s;
}
.lang-close-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
.lang-list { display: flex; flex-direction: column; gap: 8px; }
.lang-item {
  width: 100%; padding: clamp(13px,3.2vh,16px) 16px;
  border: 2px solid rgba(255,255,255,0.12); border-radius: var(--radius-btn);
  background: rgba(255,255,255,0.06); color: #fff; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  font-size: clamp(14px,4vw,17px); font-weight: 700;
  -webkit-appearance: none; transition: all 0.2s; text-align: left;
}
.lang-item:active { transform: scale(0.98); }
.lang-item.selected { border-color: var(--amber); background: rgba(245,166,35,0.18); }
.li-flag  { font-size: clamp(20px,5.5vw,24px); line-height: 1; }
.li-name  { flex: 1; }
.li-check { font-size: 16px; color: var(--amber); display: none; }
.lang-item.selected .li-check { display: block; }

/* ===== GAME ===== */
#screen-game {
  padding-top: max(14px, env(safe-area-inset-top, 14px));
  gap: 10px;
}

.game-header { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.exit-btn {
  width: clamp(34px,8vw,42px); height: clamp(34px,8vw,42px);
  border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(12px,3vw,15px); font-weight: 900;
  color: rgba(255,255,255,0.8); flex-shrink: 0; -webkit-appearance: none;
  transition: all 0.15s;
}
.exit-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

.header-stats { flex: 1; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.stat-box {
  flex: 1; background: rgba(255,255,255,0.1); border-radius: 12px;
  padding: clamp(5px,1.5vh,9px) 8px; text-align: center; position: relative; overflow: hidden;
}
.timer-box {
  flex: 1; background: rgba(255,255,255,0.1); border-radius: 12px;
  padding: clamp(5px,1.5vh,9px) 8px; text-align: center;
  border: 2px solid rgba(255,255,255,0.25); transition: all 0.3s;
}
.timer-box.urgent {
  border-color: var(--red); background: rgba(232,48,74,0.2);
  animation: timerShake 0.4s ease infinite;
}
@keyframes timerShake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-2px); }
  75%      { transform: translateX(2px); }
}
.timer-box.urgent .stat-num { color: #ff8a9a; }
.stat-lbl { font-size: clamp(9px,2vw,11px); color: var(--muted); letter-spacing: 0.4px; text-transform: uppercase; }
.stat-num { font-size: clamp(17px,4.5vw,22px); font-weight: 900; transition: transform 0.15s; }
.stat-num.bump { animation: numBump 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes numBump {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.4); }
  100% { transform: scale(1); }
}

/* ===== CARD ===== */
.card-wrap {
  flex: 1; min-height: 0;
  perspective: 1000px;
}
.card {
  width: 100%; height: 100%;
  border-radius: var(--radius); overflow: hidden;
  box-shadow: 0 10px 32px rgba(0,0,0,0.5);
  display: flex; flex-direction: column;
  transition: transform 0.15s;
  transform-origin: center center;
}
.card.flip-out {
  animation: cardFlipOut 0.22s ease-in both;
}
.card.flip-in {
  animation: cardFlipIn 0.28s ease-out both;
}
@keyframes cardFlipOut {
  from { transform: rotateY(0) scale(1); opacity: 1; }
  to   { transform: rotateY(90deg) scale(0.9); opacity: 0; }
}
@keyframes cardFlipIn {
  from { transform: rotateY(-90deg) scale(0.9); opacity: 0; }
  to   { transform: rotateY(0) scale(1); opacity: 1; }
}

/* correct flash */
.card.flash-correct .card-head {
  animation: flashCorrect 0.4s ease both;
}
@keyframes flashCorrect {
  0%,100% { background: var(--card-head); }
  50%     { background: #27c465; }
}

/* taboo shake */
.card.shake {
  animation: cardShake 0.4s ease both;
}
@keyframes cardShake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-10px); }
  40%     { transform: translateX(10px); }
  60%     { transform: translateX(-8px); }
  80%     { transform: translateX(8px); }
}

.card-head {
  background: var(--card-head); padding: clamp(12px,3vh,20px) 16px;
  text-align: center; flex-shrink: 0; transition: background 0.3s;
}
.target-word {
  font-size: clamp(24px,7vw,36px); font-weight: 900; color: #fff;
  letter-spacing: 2px; text-transform: uppercase;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.card-body {
  background: #fff; flex: 1;
  display: flex; flex-direction: column; justify-content: center;
  padding: clamp(6px,1.5vh,12px) clamp(16px,4vw,24px); overflow: hidden;
}
.taboo-list { list-style: none; width: 100%; }
.taboo-list li {
  font-size: clamp(15px,4.5vw,21px); font-weight: 700; color: #1a1a1a;
  padding: clamp(7px,1.8vh,11px) 0; border-bottom: 1.5px solid #eee; text-align: center;
  transition: all 0.2s;
}
.taboo-list li:last-child { border-bottom: none; }

/* ===== FLOATING SCORE ===== */
.float-score {
  position: fixed; pointer-events: none; z-index: 999;
  font-size: 22px; font-weight: 900;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  animation: floatUp 0.8s ease-out both;
}
.float-score.pos { color: #27c465; }
.float-score.neg { color: #ff6b7a; }
@keyframes floatUp {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
}

/* ===== ACTIONS ===== */
.action-wrap { flex-shrink: 0; }
.action-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: clamp(8px,2vw,12px); margin-bottom: 6px;
}
.act-btn {
  padding: clamp(12px,3vh,17px) 4px; border: none; border-radius: var(--radius-btn);
  cursor: pointer; font-size: clamp(20px,6vw,28px); font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 5px 14px rgba(0,0,0,0.3);
  -webkit-appearance: none; transition: all 0.15s; line-height: 1;
  position: relative; overflow: hidden;
}
.act-btn::after {
  content: ""; position: absolute; inset: 0;
  background: rgba(255,255,255,0.3); border-radius: inherit;
  transform: scale(0); opacity: 0; transition: transform 0.3s, opacity 0.3s;
}
.act-btn:active::after { transform: scale(2); opacity: 0; transition: 0s; }
.act-btn:active { transform: scale(0.91); box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
.act-btn:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }
.act-btn.taboo   { background: linear-gradient(135deg,#e8304a,#c42038); color:#fff; }
.act-btn.pass    { background: linear-gradient(135deg,#178fd4,#0e6fa8); color:#fff; }
.act-btn.correct { background: linear-gradient(135deg,#27c465,#1aab54); color:#fff; }

/* btn entrance */
.act-btn { animation: btnEntrance 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
.act-btn.taboo   { animation-delay: 0.05s; }
.act-btn.pass    { animation-delay: 0.1s; }
.act-btn.correct { animation-delay: 0.15s; }
@keyframes btnEntrance {
  from { opacity: 0; transform: translateY(20px) scale(0.8); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.action-labels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: clamp(8px,2vw,12px); }
.act-lbl { text-align: center; font-size: clamp(10px,2.5vw,12px); color: var(--muted); font-weight: 600; }
.pass-info { text-align: center; font-size: clamp(10px,2.5vw,12px); color: var(--muted); margin-top: 6px; }

/* ===== PAUSE ===== */
.pause-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  align-items: center; justify-content: center; z-index: 200;
}
.pause-overlay.show { display: flex; animation: fadeIn 0.2s ease both; }
.pause-overlay.show .pause-box { animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes popIn {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.pause-box {
  background: var(--bg2); border-radius: var(--radius);
  padding: clamp(22px,5vw,30px) clamp(18px,4vw,26px);
  width: min(300px,88vw); text-align: center;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.pause-title { font-size: clamp(16px,4.5vw,20px); font-weight: 900; margin-bottom: 6px; }
.pause-sub   { font-size: clamp(12px,3vw,14px); color: var(--muted); margin-bottom: 18px; }
.pause-btn {
  width: 100%; padding: clamp(12px,3vw,15px);
  border-radius: var(--radius-btn);
  font-size: clamp(13px,3.8vw,16px); font-weight: 900;
  cursor: pointer; margin-bottom: 10px; border: none;
  -webkit-appearance: none; transition: all 0.15s;
}
.pause-btn:last-child { margin-bottom: 0; }
.pause-btn:active { transform: scale(0.97); }
.pause-btn.continue { background: linear-gradient(135deg,#27c465,#1aab54); color:#fff; box-shadow:0 4px 14px rgba(39,196,101,0.4); }
.pause-btn.quit     { background: linear-gradient(135deg,#e8304a,#c42038); color:#fff; box-shadow:0 4px 14px rgba(232,48,74,0.4); }

/* ===== RESULT ===== */
#screen-result {
  justify-content: center;
  padding-top: max(24px, env(safe-area-inset-top, 24px));
  gap: 12px;
}
.result-score-wrap {
  background: rgba(255,255,255,0.1); border-radius: var(--radius);
  padding: clamp(18px,4vh,28px); text-align: center;
  border: 1px solid rgba(255,255,255,0.15);
}
.result-score {
  font-size: clamp(56px,16vw,84px); font-weight: 900; line-height: 1;
  animation: scoreReveal 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes scoreReveal {
  from { transform: scale(0.3); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.result-lbl { font-size: clamp(12px,3vw,14px); color: var(--muted); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
.result-stats { display: flex; gap: 10px; margin-top: 16px; }
.rstat {
  flex: 1; background: rgba(255,255,255,0.08); border-radius: 12px;
  padding: clamp(10px,2.5vh,14px) 8px; text-align: center;
  animation: statSlide 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.rstat:nth-child(1) { animation-delay: 0.3s; }
.rstat:nth-child(2) { animation-delay: 0.4s; }
.rstat:nth-child(3) { animation-delay: 0.5s; }
@keyframes statSlide {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.rstat-n { font-size: clamp(20px,5.5vw,26px); font-weight: 900; }
.rstat-l { font-size: clamp(10px,2.3vw,12px); color: var(--muted); margin-top: 2px; }
.rstat.green .rstat-n { color: #27c465; }
.rstat.amber .rstat-n { color: var(--amber); }
.rstat.red   .rstat-n { color: #ff8a9a; }

.play-again {
  width: 100%; padding: clamp(13px,3.2vh,17px);
  background: linear-gradient(135deg,#178fd4,#0e6fa8);
  color: #fff; border: none; border-radius: var(--radius-btn);
  font-size: clamp(15px,4vw,18px); font-weight: 900; cursor: pointer;
  letter-spacing: 0.5px; box-shadow: 0 6px 20px rgba(23,143,212,0.4);
  -webkit-appearance: none; transition: all 0.2s;
  animation: statSlide 0.4s 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
.play-again:active { transform: scale(0.97); }

/* ===== CONFETTI ===== */
.confetti-piece {
  position: fixed; width: 10px; height: 10px;
  top: -10px; pointer-events: none; z-index: 998;
  border-radius: 2px;
  animation: confettiFall linear both;
}
@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>
<div id="app">

  <!-- SETUP -->
  <div class="screen active" id="screen-setup">
    <div class="logo-wrap">
      <div class="logo-icon">T</div>
      <div class="logo-title">TABOO</div>
      <div class="logo-sub">Kelime tahmin oyunu</div>
      <div class="logo-sub">Created by Muhammed Talay</div>
    </div>
    <div class="setup-block">
      <div class="setup-lbl">Dil sec</div>
      <button class="lang-select-btn" id="lang-select-btn" onclick="openLangModal()">
        <div class="lang-left">
          <span class="lang-flag" id="lang-flag">&#127760;</span>
          <span id="lang-name">Dil secin...</span>
        </div>
        <span class="lang-arrow">&#9660;</span>
      </button>
    </div>
    <div class="setup-block">
      <div class="setup-lbl">Seviye sec</div>
      <div class="level-grid">
        <button class="level-btn" data-level="A1" onclick="selectLevel('A1')"><span class="level-badge">A1</span><span class="level-desc">Baslangic</span></button>

var LANG_META={EN:{name:"Ingilizce",flag:"&#127468;&#127463;"},TR:{name:"Turkce",flag:"&#127481;&#127479;"},ES:{name:"Ispanyolca",flag:"&#127466;&#127480;"},FA:{name:"Farsa",flag:"&#127470;&#127479;"},KU:{name:"Kurtce",flag:"&#127988;"}};

/* ===== STATE ===== */
var selectedLang=null,selectedLevel=null,timeLimit=90;
var timerInterval=null,timeLeft=90;
var score=0,passesLeft=3,correctCount=0,passCount=0,tabooCount=0;
var deck=[],deckIdx=0,isPaused=false;
var timeMap={1:30,2:60,3:90,4:120,5:150};

/* ===== LANG MODAL ===== */
function openLangModal(){document.getElementById('lang-overlay').classList.add('show');}
function closeLangModal(){document.getElementById('lang-overlay').classList.remove('show');}
function closeLangModalOutside(e){if(e.target===document.getElementById('lang-overlay'))closeLangModal();}
function selectLang(code){
  selectedLang=code;
  var m=LANG_META[code];
  document.getElementById('lang-flag').innerHTML=m.flag;
  document.getElementById('lang-name').textContent=m.name;
  document.getElementById('lang-select-btn').classList.add('selected');
  document.querySelectorAll('.lang-item').forEach(function(b){b.classList.remove('selected');});
  document.querySelector('[data-lang="'+code+'"]').classList.add('selected');
  closeLangModal(); checkStartBtn();
}

/* ===== SETUP ===== */
function selectLevel(lvl){
  selectedLevel=lvl;
  document.querySelectorAll('.level-btn').forEach(function(b){b.classList.remove('selected');});
  document.querySelector('[data-level="'+lvl+'"]').classList.add('selected');
  checkStartBtn();
}
function checkStartBtn(){document.getElementById('start-btn').disabled=!(selectedLang&&selectedLevel);}
function updateTime(val){timeLimit=timeMap[val];document.getElementById('time-display').textContent=timeLimit+'s';}

/* ===== SCREEN TRANSITION ===== */
function showScreen(id){
  var current=document.querySelector('.screen.active');
  var next=document.getElementById(id);
  if(current===next)return;
  if(current){
    current.classList.add('exit');
    setTimeout(function(){current.classList.remove('active','exit');},250);
  }
  setTimeout(function(){next.classList.add('active');},current?200:0);
}

/* ===== CARD ANIMATION ===== */
function renderCard(){
  if(deckIdx>=deck.length){deckIdx=0;shuffle(deck);}
  var card=deck[deckIdx++];
  var el=document.getElementById('word-card');
  el.classList.add('flip-out');
  setTimeout(function(){
    document.getElementById('card-word').textContent=card.word;
    document.getElementById('card-taboo').innerHTML=card.taboo.map(function(t){return'<li>'+t+'</li>';}).join('');
    el.classList.remove('flip-out');
    el.classList.add('flip-in');
    setTimeout(function(){el.classList.remove('flip-in');},300);
    setButtons(true);
  },180);
}

function setButtons(on){
  document.getElementById('btn-correct').disabled=!on;
  document.getElementById('btn-pass').disabled=!on||passesLeft<=0;
  document.getElementById('btn-taboo').disabled=!on;
}

/* ===== FLOATING SCORE ===== */
function spawnFloat(text,cls,btnEl){
  var rect=btnEl.getBoundingClientRect();
  var el=document.createElement('div');
  el.className='float-score '+cls;
  el.textContent=text;
  el.style.left=(rect.left+rect.width/2-15)+'px';
  el.style.top=(rect.top-10)+'px';
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},800);
}

/* ===== CONFETTI ===== */
function launchConfetti(){
  var colors=['#27c465','#178fd4','#f5a623','#e8304a','#fff','#a78bfa'];
  for(var i=0;i<40;i++){
    (function(i){
      setTimeout(function(){
        var el=document.createElement('div');
        el.className='confetti-piece';
        el.style.left=Math.random()*100+'vw';
        el.style.background=colors[Math.floor(Math.random()*colors.length)];
        el.style.width=(Math.random()*8+6)+'px';
        el.style.height=(Math.random()*8+6)+'px';
        el.style.animationDuration=(Math.random()*1.5+1)+'s';
        el.style.animationDelay='0s';
        el.style.borderRadius=Math.random()>0.5?'50%':'2px';
        document.body.appendChild(el);
        setTimeout(function(){el.remove();},2500);
      },i*40);
    })(i);
  }
}

/* ===== BUMP ANIMATION ===== */
function bumpNum(id){
  var el=document.getElementById(id);
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(function(){el.classList.remove('bump');},300);
}

/* ===== ACTIONS ===== */
function markCorrect(){
  var btn=document.getElementById('btn-correct');
  document.getElementById('word-card').classList.add('flash-correct');
  setTimeout(function(){document.getElementById('word-card').classList.remove('flash-correct');},400);
  spawnFloat('+1','pos',btn);
  score++;correctCount++;
  document.getElementById('score-display').textContent=score;
  bumpNum('score-display');
  renderCard();
}
function markPass(){
  if(passesLeft<=0)return;
  passesLeft--;passCount++;
  document.getElementById('pass-display').textContent=passesLeft;
  bumpNum('pass-display');
  document.getElementById('pass-info').textContent=passesLeft===0?'Pas hakkin kalmadi':passesLeft+' pas hakkin var';
  if(passesLeft===0)document.getElementById('btn-pass').disabled=true;
  renderCard();
}
function markTaboo(){
  var btn=document.getElementById('btn-taboo');
  document.getElementById('word-card').classList.add('shake');
  setTimeout(function(){document.getElementById('word-card').classList.remove('shake');},400);
  spawnFloat('-1','neg',btn);
  score=Math.max(0,score-1);tabooCount++;
  document.getElementById('score-display').textContent=score;
  bumpNum('score-display');
  renderCard();
}

/* ===== PAUSE ===== */
function pauseGame(){
  if(isPaused)return;isPaused=true;clearInterval(timerInterval);setButtons(false);
  document.getElementById('pause-overlay').classList.add('show');
}
function resumeGame(){
  isPaused=false;document.getElementById('pause-overlay').classList.remove('show');
  setButtons(true);if(passesLeft===0)document.getElementById('btn-pass').disabled=true;
  timerInterval=setInterval(tick,1000);
}
function quitGame(){
  isPaused=false;document.getElementById('pause-overlay').classList.remove('show');
  clearInterval(timerInterval);resetGame();
}

/* ===== TIMER ===== */
function tick(){
  timeLeft--;
  document.getElementById('timer-display').textContent=timeLeft;
  if(timeLeft<=10)document.getElementById('timer-box').classList.add('urgent');
  if(timeLeft<=0){clearInterval(timerInterval);endGame();}
}
function startTimer(){
  timeLeft=timeLimit;
  document.getElementById('timer-display').textContent=timeLeft;
  document.getElementById('timer-box').classList.remove('urgent');
  timerInterval=setInterval(tick,1000);
}

/* ===== GAME FLOW ===== */
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}return arr;}

function startGame(){
  score=0;passesLeft=3;correctCount=0;passCount=0;tabooCount=0;deckIdx=0;isPaused=false;
  deck=shuffle(WORDS[selectedLang][selectedLevel].slice());
  document.getElementById('score-display').textContent='0';
  document.getElementById('pass-display').textContent='3';
  document.getElementById('pass-info').textContent='3 pas hakkin var';
  showScreen('screen-game');
  setTimeout(function(){startTimer();renderCard();},350);
}
function endGame(){
  setButtons(false);clearInterval(timerInterval);
  document.getElementById('final-score').textContent=score;
  document.getElementById('stat-correct').textContent=correctCount;
  document.getElementById('stat-pass').textContent=passCount;
  document.getElementById('stat-taboo').textContent=tabooCount;
  showScreen('screen-result');
  if(score>0)setTimeout(launchConfetti,400);
}
function resetGame(){clearInterval(timerInterval);showScreen('screen-setup');}

/* ===== PWA SERVICE WORKER ===== */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
